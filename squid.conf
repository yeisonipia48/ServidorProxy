# =========================
# CONFIGURACIÓN BÁSICA
# =========================

http_port 3128
visible_hostname server-proxy

# =========================
# ACL - REDES
# =========================

# Red interna permitida (AJUSTAR SI ES NECESARIO)
acl red_real src 10.20.20.0/28
acl red_yeison src 10.0.2.0/28
acl red_docker src 10.0.0.0/24
# =========================
# ACL - PUERTOS SEGUROS
# =========================

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 21
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777

acl CONNECT method CONNECT

# =========================
# ACL - BLOQUEO DE SITIOS
# =========================

# Archivo externo de blacklist
acl sitios_bloqueados dstdomain "/etc/squid/blacklist.txt"

# Bloqueo por palabras en URL (opcional)
acl palabras_prohibidas url_regex -i casino apuestas adultos

# =========================
# REGLAS DE ACCESO (ORDEN IMPORTANTE)
# =========================

# Denegar puertos inseguros
http_access deny !Safe_ports

# Denegar CONNECT fuera de SSL
http_access deny CONNECT !SSL_ports

# Denegar sitios bloqueados
http_access deny sitios_bloqueados

# Denegar palabras prohibidas
http_access deny palabras_prohibidas

# Permitir red interna
http_access allow red_docker
http_access allow red_real
http_access allow red_yeison


# Denegar todo lo demás
http_access deny all

# =========================
# LOGS
# =========================

access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log

# =========================
# CONFIGURACIÓN DE CACHÉ
# =========================

cache_mem 256 MB
maximum_object_size 50 MB
cache_dir ufs /var/spool/squid 100 16 256

# =========================
# SEGURIDAD ADICIONAL
# =========================

via off
forwarded_for delete
